<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
    <defs>
        <linearGradient id="scannerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ef8354" stop-opacity="0" />
            <stop offset="50%" stop-color="#ef8354" stop-opacity="0.8" />
            <stop offset="100%" stop-color="#ef8354" stop-opacity="0" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <style>
            @keyframes scanMove {
                0%, 100% { transform: translateY(0px); }
                50% { transform: translateY(220px); }
            }
            @keyframes documentFloat {
                0%, 100% { transform: translateY(0) rotate(10deg); }
                50% { transform: translateY(-15px) rotate(12deg); }
            }
            @keyframes textExtract {
                0%, 40% { opacity: 0; transform: translateX(-20px); }
                60%, 100% { opacity: 1; transform: translateX(0); }
            }
            @keyframes textExtract2 {
                0%, 60% { opacity: 0; transform: translateX(-20px); }
                80%, 100% { opacity: 1; transform: translateX(0); }
            }
            @keyframes pulse {
                0%, 100% { transform: scale(1); opacity: 0.8;}
                50% { transform: scale(1.05); opacity: 1;}
            }

            .scanner-line {
                animation: scanMove 4s ease-in-out infinite;
            }
            .document {
                animation: documentFloat 6s ease-in-out infinite;
                transform-origin: center;
            }
            .extracted-text-1 {
                animation: textExtract 4s ease-out infinite;
            }
            .extracted-text-2 {
                animation: textExtract2 4s ease-out infinite;
            }
            .server-icon {
                animation: pulse 3s infinite;
                transform-origin: center;
            }
        </style>
    </defs>

    <!-- Background Elements -->
    <circle cx="250" cy="200" r="180" fill="#2d3142" opacity="0.05" />
    <circle cx="250" cy="200" r="120" fill="#ef8354" opacity="0.05" />

    <!-- Isometric Document Background (Image) -->
    <g class="document" transform="translate(50, 40) rotate(10, 150, 150)">
        <rect x="50" y="50" width="180" height="240" rx="10" fill="#ffffff" stroke="#bfc0c0" stroke-width="2" filter="url(#glow)"/>
        <!-- Document Content (Image representation) -->
        <rect x="70" y="80" width="140" height="120" rx="5" fill="#f3f4f6" />
        <path d="M 80 180 L 120 120 L 150 160 L 170 140 L 200 180 Z" fill="#bfc0c0" opacity="0.5"/>
        <circle cx="100" cy="110" r="15" fill="#bfc0c0" opacity="0.5"/>
        
        <rect x="70" y="220" width="140" height="10" rx="5" fill="#e5e7eb" />
        <rect x="70" y="240" width="100" height="10" rx="5" fill="#e5e7eb" />
        <rect x="70" y="260" width="120" height="10" rx="5" fill="#e5e7eb" />
    </g>

    <!-- The Scanner Logic -->
    <g transform="translate(50, 40) rotate(10, 150, 150)">
        <g class="scanner-line">
            <!-- Glow Line -->
            <rect x="40" y="50" width="200" height="4" fill="url(#scannerGrad)" filter="url(#glow)"/>
            <!-- Center Sharp Line -->
            <rect x="40" y="51" width="200" height="1" fill="#ef8354" />
        </g>
    </g>

    <!-- Center Connection -->
    <path d="M 230 200 C 280 200, 300 150, 340 150" fill="none" stroke="#bfc0c0" stroke-width="2" stroke-dasharray="5 5" />
    <circle cx="280" cy="175" r="4" fill="#ef8354">
        <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite" />
        <animateMotion dur="2s" repeatCount="indefinite" path="M -50 25 C 0 25, 20 -25, 60 -25" />
    </circle>

    <!-- Transformed Output (Text) -->
    <g transform="translate(280, 80)">
        <rect x="50" y="50" width="160" height="200" rx="10" fill="#ffffff" stroke="#4f5d75" stroke-width="2" filter="url(#glow)" />
        <g class="extracted-text-1">
            <rect x="70" y="80" width="120" height="12" rx="6" fill="#2d3142" />
            <rect x="70" y="105" width="100" height="12" rx="6" fill="#2d3142" />
            <rect x="70" y="130" width="110" height="12" rx="6" fill="#2d3142" />
        </g>
        <g class="extracted-text-2">
            <rect x="70" y="165" width="120" height="12" rx="6" fill="#4f5d75" />
            <rect x="70" y="190" width="90" height="12" rx="6" fill="#4f5d75" />
            <rect x="70" y="215" width="105" height="12" rx="6" fill="#4f5d75" />
        </g>
    </g>

    <!-- Cloud / AI Server floating icon -->
    <g class="server-icon" transform="translate(240, 270)">
        <rect x="-30" y="0" width="60" height="45" rx="8" fill="#2d3142" />
        <circle cx="-10" cy="12" r="3" fill="#ef8354" />
        <circle cx="10" cy="12" r="3" fill="#ef8354" />
        <rect x="-15" y="25" width="30" height="4" rx="2" fill="#ef8354" opacity="0.5" />
        <path d="M 0 0 L 0 -15" stroke="#ef8354" stroke-width="2" stroke-dasharray="2 2" />
    </g>
</svg>
